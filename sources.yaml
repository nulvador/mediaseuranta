# =====================================================================
# Golf Media Monitor — lähteet
# =====================================================================
# Jokainen lähde voi määritellä 1–3 hakutapaa. Järjestys: rss → html → google_news.
# Ensimmäinen, joka tuottaa artikkeleita, voittaa.
#
#   rss:          suora RSS/Atom-syöte (luotettavin)
#   html:         uutislistaussivu + CSS-selektorit (jos ei RSS:ää)
#   google_news:  domain, josta muodostetaan Google News site: -haku (fallback)
#
# tab: "golfliitot" (vain viralliset liitot) | "golfmediat" (mediat ja muut
#      organisaatiot) | "urheilu_liitot" (suomalaiset lajiliitot)
# Uusi lähde = uusi lohko tähän tiedostoon. Koodia ei tarvitse muuttaa.
# =====================================================================

defaults:
  html_selectors:
    container: ["article", ".news-item", ".news-card", ".card", ".teaser", ".post", ".views-row", ".list-item"]
    title: ["h2", "h3", "h4", ".entry-title", ".card-title", ".title"]
    date: ["time", ".date", ".entry-date", ".publish-date", ".meta-date"]
    summary: [".ingress", ".entry-summary", ".excerpt", ".card-text", "p"]

